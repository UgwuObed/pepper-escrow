name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── Continuous Integration ─────────────────────────────────────
  tests:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: pepper_escrow_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: pdo_mysql, bcmath, mbstring, xml
          tools: composer:v2

      - name: Copy .env
        run: |
          cp .env.example .env
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=pepper_escrow_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=/' .env
          php artisan key:generate

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Migrations
        run: php artisan migrate --env=testing

      - name: Run Tests
        run: php artisan test

  # ─── Continuous Deployment ──────────────────────────────────────
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [tests]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USER }}/pepper-escrow

            # Pull latest code
            git pull origin main

            # Write production .env (docker-compose reads this automatically)
            cat > .env << 'EOF'
DB_PASSWORD=${{ secrets.DB_PASSWORD }}
MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
APP_URL=${{ secrets.APP_URL }}
APP_PORT=80
ESCROW_DEFAULT_GATEWAY=${{ secrets.ESCROW_DEFAULT_GATEWAY }}
PAYSTACK_PUBLIC_KEY=${{ secrets.PAYSTACK_PUBLIC_KEY }}
PAYSTACK_SECRET_KEY=${{ secrets.PAYSTACK_SECRET_KEY }}
STRIPE_PUBLIC_KEY=${{ secrets.STRIPE_PUBLIC_KEY }}
STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
SEERBIT_PUBLIC_KEY=${{ secrets.SEERBIT_PUBLIC_KEY }}
SEERBIT_SECRET_KEY=${{ secrets.SEERBIT_SECRET_KEY }}
SEERBIT_ENCRYPTION_KEY=${{ secrets.SEERBIT_ENCRYPTION_KEY }}
FLUTTERWAVE_PUBLIC_KEY=${{ secrets.FLUTTERWAVE_PUBLIC_KEY }}
FLUTTERWAVE_SECRET_KEY=${{ secrets.FLUTTERWAVE_SECRET_KEY }}
FLUTTERWAVE_ENCRYPTION_KEY=${{ secrets.FLUTTERWAVE_ENCRYPTION_KEY }}
EOF

            # Build fresh image and restart
            docker compose build --no-cache app
            docker compose up -d --force-recreate
            docker image prune -f
