name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  tests:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: pepper_escrow_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: pdo_mysql, bcmath, mbstring, xml
          tools: composer:v2

      - name: Copy .env
        run: |
          cp .env.example .env
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=pepper_escrow_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=/' .env

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Generate App Key
        run: php artisan key:generate

      - name: Run Migrations
        run: php artisan migrate --env=testing

      - name: Run Tests
        run: php artisan test

  # ─── Continuous Deployment ──────────────────────────────────────
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [tests]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USER }}/pepper-escrow
            git pull origin main

            # Ensure .env exists with APP_KEY (generated only once)
            if [ ! -f .env ]; then
              cp .env.example .env
            fi
            if ! grep -qE '^APP_KEY=base64:' .env; then
              KEY="base64:$(openssl rand -base64 32)"
              sed -i "s|^APP_KEY=.*|APP_KEY=$KEY|" .env
            fi

            docker compose build --no-cache app
            docker compose up -d --force-recreate
            docker image prune -f
